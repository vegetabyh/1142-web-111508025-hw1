<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baking 日誌 · 蔡雅涵</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="layout" id="layout">
    <aside class="sidebar" aria-label="網站選單與簡介">
      <div class="sidebar__inner">
        <div class="sidebar__avatar">
          <img class="sidebar__avatar-img" src="../images/head.jpg?v=20260412" alt="蔡雅涵" />
        </div>
        <p class="sidebar__name">蔡雅涵</p>
        <p class="sidebar__en">YAHAN · TSAI</p>
        <p class="sidebar__tagline">設計 ｜ 創作 ｜ 探索</p>
        <p class="sidebar__bio">佛陀開的店叫什麼？Photoshop！</p>
        <div class="sidebar__social" aria-label="社群連結">
          <a class="sidebar__social-link" href="https://www.instagram.com/vegetab.yh/" target="_blank" rel="noopener noreferrer" aria-label="Instagram（另開新分頁）">IG</a>
          <a class="sidebar__social-link" href="https://www.facebook.com/ya.han.JK0905?locale=zh_TW" target="_blank" rel="noopener noreferrer" aria-label="Facebook（另開新分頁）">FB</a>
          <a class="sidebar__social-link" href="https://www.threads.com/@vegetab.yh?hl=zh-tw" target="_blank" rel="noopener noreferrer" aria-label="Threads（另開新分頁）">@</a>
        </div>
        <nav class="sidebar__nav" aria-label="主要導覽">
          <a href="/" data-view="home" class="sidebar__nav-btn">首頁</a>
          <a href="/about" data-view="about" class="sidebar__nav-btn">關於我</a>
          <a href="/interests" data-view="interests" class="sidebar__nav-btn">個人興趣</a>
          <a href="/portfolio" data-view="portfolio" class="sidebar__nav-btn">作品集</a>
        </nav>
        <p class="sidebar__copy">小雅，可能是此生修的最後一堂程式課</p>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="main-topbar">
        <button type="button" class="back-btn" id="backBtn" aria-label="返回選單">← 返回</button>
      </header>
      <main class="app-main">
        <section id="view-baking" class="view view--active" aria-label="Baking 日誌">
          <div class="page__header fade-in">
            <h1 class="page__title"><span class="page__title-en">BAKING LOG</span><span class="page__title-zh">烘焙日誌</span></h1>
            <p class="baking-path"><a href="/interests">個人興趣</a> <span aria-hidden="true">&gt;</span> Baking</p>
            <p>把每次做甜點的成果，疊成一本會翻頁的回憶。</p>
          </div>
          <div class="page__body">
            <div class="baking-stage">
              <p class="baking-hint">點擊最上面的卡片，照片會翻到最後一張。</p>
              <div class="baking-stack" id="bakingStack" aria-live="polite">
                <article class="bake-card is-top" data-bake-card>
                  <img src="../images/bake.jpg?v=20260412" alt="焦糖布丁成品" />
                  <div class="bake-card__meta"><h3>焦糖布丁</h3><p>2026/04/10 · 口感超滑順</p></div>
                </article>
                <article class="bake-card" data-bake-card>
                  <img src="../images/photo.jpg?v=20260412" alt="烘焙過程紀錄" />
                  <div class="bake-card__meta"><h3>巧克力餅乾</h3><p>2026/03/28 · 第一次掌握酥脆感</p></div>
                </article>
                <article class="bake-card" data-bake-card>
                  <img src="../images/pic.jpg?v=20260412" alt="司康與茶點" />
                  <div class="bake-card__meta"><h3>伯爵司康</h3><p>2026/03/12 · 奶香升級成功</p></div>
                </article>
                <article class="bake-card" data-bake-card>
                  <img src="../images/yourpic.jpg?v=20260412" alt="蛋糕裝飾" />
                  <div class="bake-card__meta"><h3>草莓鮮奶油蛋糕</h3><p>2026/02/20 · 擠花終於變順手</p></div>
                </article>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
